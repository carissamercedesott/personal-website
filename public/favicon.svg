<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- The DJ deck, as a mark: the same parts as the .dj-deck widget in
       dj.css — white body, vinyl with a blush label, tonearm resting at -28°.
       The grooves are stroked circles rather than the widget's repeating
       radial gradient, which turns to mush at 16px. -->
  <rect class="body" x="2" y="2" width="60" height="60" rx="16" fill="#FFFFFF"/>
  <rect class="body" x="2" y="2" width="60" height="60" rx="16" fill="none" stroke="#E6DDD8" stroke-width="2"/>
  <circle cx="32" cy="32" r="23" fill="#2B2624"/>
  <circle cx="32" cy="32" r="17.5" fill="none" stroke="#383230" stroke-width="2"/>
  <circle cx="32" cy="32" r="12.5" fill="none" stroke="#383230" stroke-width="2"/>
  <circle cx="32" cy="32" r="8" fill="#E36A62" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Same -28° rest angle and top-center pivot as the widget, but seated
       further in: the real deck lets the arm overflow its box, which an icon
       can't — the viewBox would crop the tip flat. It still breaks the rounded
       corner, which is the bit that reads as a tonearm. A shade thicker than
       a strict scale of the widget's 4px, so it survives 16px. -->
  <rect x="47.7" y="5.3" width="4.2" height="23.1" rx="2.1" fill="#7D6E66"
        transform="rotate(-28 49.8 5.3)"/>
  <style>
    /* .body, not rect — the tonearm is a rect too, and would otherwise
       repaint itself near-black and vanish against the vinyl. */
    @media (prefers-color-scheme: dark) {
      .body { fill: #231E1B; stroke: #4E443F; }
    }
  </style>
</svg>
