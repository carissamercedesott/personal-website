<!doctype html>
<html lang="en" class="smiski-live">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Principles — preview harness</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/site.css" />
    <link rel="stylesheet" href="/styles/home.css" />
    <style>
      /* Stand-in for the walker: the smiski's real footprint (110 × 150),
         with his feet at the bottom edge of the stage anchor. */
      .fake-smiski {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 110px;
        height: 150px;
        margin-left: -55px;
        border-radius: 44px 44px 30px 30px;
        background: var(--smiski-green);
        opacity: 0.9;
      }
    </style>
  </head>
  <body class="home">
    <main>
      <section class="page-section band-oat" id="principles">
        <div class="section-inner">
          <div class="principles-board">
            <div class="principles-head" data-reveal>
              <span class="section-label"><span class="section-label-num">02</span>Principles</span>
              <h2>How I build</h2>
            </div>

            <div class="principles-stage" data-smiski-study aria-hidden="true">
              <div class="fake-smiski"></div>
            </div>

            <ol class="principles-list" role="list">
              <li class="principle principle--far" data-reveal>
                <span class="principle-num">01</span>
                <h3>Design with empathy</h3>
              </li>
              <li class="principle" data-reveal>
                <span class="principle-num">02</span>
                <h3>Ground UX in research</h3>
              </li>
              <li class="principle" data-reveal>
                <span class="principle-num">03</span>
                <h3>Build worlds with consistent laws</h3>
              </li>
            </ol>

            <a class="principles-exit" href="/resume">
              See full resume
              <svg class="icon" aria-hidden="true"><use href="/images/icons.svg#arrow-right"></use></svg>
            </a>
          </div>
        </div>
      </section>
    </main>
    <script>
      document
        .querySelectorAll("[data-reveal]")
        .forEach((el) => el.classList.add("is-revealed"));
    </script>
  </body>
</html>
